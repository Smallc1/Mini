services:
  web:
    build: .
    restart: unless-stopped
    env_file: .env.production
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - mall-data:/app/data
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mall-data:
